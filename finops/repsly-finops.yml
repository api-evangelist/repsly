meters:
- name: user_seats
  description: Active Repsly user licenses (field reps and back-office users), billed per user per month.
  unit: seats
  aggregation: sum
  dimensions:
  - account
  - team
  - role
- name: implementation
  description: One-time onboarding, implementation, and training services.
  unit: engagements
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track active seat count and tier against the monthly subscription invoice; API usage is not separately billed.
- name: Allocation
  description: Map user seats to teams, territories, and roles so subscription cost aligns to the field organization.
- name: Optimization
  description: Deactivate unused or seasonal seats, right-size the feature/support tier, and consolidate integration engineering rather than optimizing per-call API spend.
- name: Accountability
  description: Assign an owner for the Repsly subscription and review seat count and tier each billing cycle.
