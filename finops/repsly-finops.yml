description: >-
  FinOps view of Repsly spend. Repsly is a per-user, per-month SaaS
  subscription; cost is driven primarily by the number of user licenses (field
  reps and back-office users) and the feature/support tier, not by API call
  volume. The Web API (v3) is included in the subscription and is not separately
  metered, so there is no per-request API charge to allocate - the API's cost is
  the seat cost of the users whose data it moves, plus the engineering cost of
  building and running the ERP/CRM integration. Implementation, onboarding, and
  training are typically one-time or add-on charges.
notes: >-
  Repsly does not publish public per-seat rates; treat cost figures as
  indicative and confirm with sales. Because billing is seat-based, the main
  FinOps levers are license count, tier selection, and deactivating unused
  seats - not API usage. Verify invoice structure and any implementation fees
  during reconciliation.
