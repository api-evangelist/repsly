aid: repsly
url: https://raw.githubusercontent.com/api-evangelist/repsly/refs/heads/main/apis.yml
name: Repsly
kind: company
description: >-
  Repsly is a retail execution and field sales platform for CPG brands and field
  teams - covering in-store activity, merchandising, retail audits, order taking,
  and territory management. The Repsly Web API (v3) is a REST interface at
  https://api.repsly.com/v3 designed for ERP/CRM integration - it moves clients
  and products into Repsly (import) and pulls clients, visits, retail audits,
  forms, photos, purchase orders, pricelists, representatives, and schedules back
  out (export). Requests use HTTP Basic authentication over SSL, exchange JSON or
  XML, and paginate export results in batches of up to 50 records using timestamp
  or last-ID cursors until the response MetaCollectionResult TotalCount reaches
  zero.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Retail Execution
- Field Sales
- Merchandising
- CPG
- Retail Audits
- Sales Force Automation
